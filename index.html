<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Layout Practice</title>
    <style>
        /* 背景與基本設定 */
        body {
            background-color: #5bb2fb; /* 圖片中的藍色背景 */
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            font-family: Arial, sans-serif;
        }

        /* 白色卡片容器 */
        .container {
            background-color: white;
            width: 100%;
            max-width: 600px;
            padding: 20px;
            border-radius: 12px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* 頂部綠色區塊 */
        .header {
            background-color: #b3d944;
            height: 140px;
            border-radius: 6px;
        }

        /* 中間藍綠色區塊容器 */
        .content-row {
            display: flex;
            gap: 10px;
            /* 電腦版 (b): 預設為橫向排列 */
            flex-direction: row; 
        }

        .content-box {
            background-color: #00bcd4;
            height: 120px;
            flex: 1; /* 平分剩餘空間 */
            border-radius: 4px;
        }

        /* 底部灰色小區塊容器 */
        .footer-grid {
            display: grid;
            gap: 10px;
            /* 電腦版 (b): 預設為 4 欄 */
            grid-template-columns: repeat(4, 1fr);
        }

        .footer-item {
            background-color: #e9ecef;
            height: 50px;
            border-radius: 3px;
        }

        /* --- 響應式斷點：當寬度小於 480px (手機版) --- */
        @media (max-width: 480px) {
            /* 切換到佈局 (a) */
            .content-row {
                /* 中間區塊改為垂直堆疊 */
                flex-direction: column; 
            }

            .content-box {
                height: 80px; /* 手機版稍微縮短高度以便顯示 */
            }

            .footer-grid {
                /* 底部區塊改為 2 欄排列 (2x2) */
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header"></div>

        <div class="content-row">
            <div class="content-box"></div>
            <div class="content-box"></div>
            <div class="content-box"></div>
        </div>

        <div class="footer-grid">
            <div class="footer-item"></div>
            <div class="footer-item"></div>
            <div class="footer-item"></div>
            <div class="footer-item"></div>
        </div>
    </div>

</body>
</html>
