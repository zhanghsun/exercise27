<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Responsive Layout</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #eeeeee;
      font-family: Arial, Helvetica, sans-serif;
    }

    .outer {
      width: min(820px, 100%);
      background: #58acec;
      padding: 18px;
    }

    .panel {
      width: min(360px, 100%);
      margin: 0 auto;
      background: #f8f8f8;
      border-radius: 12px;
      padding: 12px;
    }

    .layout {
      display: grid;
      gap: 6px;
      grid-template-columns: repeat(2, 1fr);
      grid-template-areas:
        "header header"
        "main1 main1"
        "main2 main2"
        "main3 main3"
        "foot1 foot2"
        "foot3 foot4";
    }

    .box {
      width: 100%;
      border-radius: 2px;
    }

    .header {
      grid-area: header;
      height: 110px;
      background: #a8cf45;
    }

    .main {
      height: 48px;
      background: #18b8cc;
    }

    .main1 { grid-area: main1; }
    .main2 { grid-area: main2; }
    .main3 { grid-area: main3; }

    .footer {
      height: 34px;
      background: #d7dde1;
    }

    .foot1 { grid-area: foot1; }
    .foot2 { grid-area: foot2; }
    .foot3 { grid-area: foot3; }
    .foot4 { grid-area: foot4; }

    @media (min-width: 480px) {
      .panel {
        width: min(520px, 100%);
      }

      .layout {
        grid-template-columns: repeat(12, 1fr);
        grid-template-areas:
          "header header header header header header header header header header header header"
          "main1 main1 main1 main1 main2 main2 main2 main2 main3 main3 main3 main3"
          "foot1 foot1 foot1 foot2 foot2 foot2 foot3 foot3 foot3 foot4 foot4 foot4";
      }

      .header {
        height: 120px;
      }

      .main {
        height: 130px;
      }

      .footer {
        height: 78px;
      }
    }
  </style>
</head>
<body>
  <div class="outer">
    <div class="panel">
      <div class="layout">
        <div class="box header"></div>
        <div class="box main main1"></div>
        <div class="box main main2"></div>
        <div class="box main main3"></div>
        <div class="box footer foot1"></div>
        <div class="box footer foot2"></div>
        <div class="box footer foot3"></div>
        <div class="box footer foot4"></div>
      </div>
    </div>
  </div>
</body>
</html>
